name: "Authelia SSO"
description: "The Single Sign-On Multi-Factor portal for web apps."
version: "1.0.19"
slug: "authelia_sso"
init: false
arch:
  - aarch64
  - amd64
map:
  - config:rw
ports:
  9091/tcp: 9091
ports_description:
  9091/tcp: "Authelia Web UI and API"
options:
  domain: "your-domain.com"
  jwt_secret: "請在此輸入隨機的JWT字串"
  session_secret: "請在此輸入隨機的Session字串"
  encryption_key: "請在此輸入用於資料庫加密的隨機字串"
schema:
  domain: "str"
  jwt_secret: "password"
  session_secret: "password"
  encryption_key: "password"
